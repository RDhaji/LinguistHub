<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinguistHub | Universal Cloud Master</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --accent: #2563eb;
            --border: #e2e8f0; --sidebar: #ffffff; --item-hover: #f1f5f9; --def-bg: #f8fafc;
            --star-active: #f59e0b; --star-inactive: #cbd5e1; --danger: #f43f5e;
        }
        [data-theme="dark"] {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #3b82f6;
            --border: #334155; --sidebar: #0f172a; --item-hover: #1e293b; --def-bg: #334155;
        }

        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
        
        #sidebar { width: 30%; min-width: 300px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; }
        .sidebar-tabs { display: flex; border-bottom: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 20px; border: none; background: none; cursor: pointer; color: var(--text); font-weight: 800; opacity: 0.3; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; transition: 0.3s; }
        .tab-btn.active { opacity: 1; border-bottom: 3px solid var(--accent); }
        
        #list-items { flex: 1; overflow-y: auto; }
        .list-item { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; cursor: pointer; transition: 0.2s; gap: 10px; }
        .list-item:hover { background: var(--item-hover); }
        .item-text { flex: 1; font-weight: 600; font-size: 0.95rem; text-transform: capitalize; }

        .action-icon { width: 18px; height: 18px; fill: var(--star-inactive); transition: 0.2s; cursor: pointer; }
        .star-svg.active { fill: var(--star-active) !important; }
        .del-svg:hover { fill: var(--danger) !important; }

        .sidebar-footer { padding: 20px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
        .btn-side { padding: 12px; border-radius: 12px; border: none; cursor: pointer; font-weight: 800; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }

        main { flex: 1; overflow-y: auto; padding: 40px; }
        .theme-switch-wrapper { display: flex; align-items: center; justify-content: flex-end; margin-bottom: 30px; }
        .theme-switch { display: inline-block; height: 34px; position: relative; width: 70px; cursor: pointer; }
        .theme-switch input { display: none; }
        .slider { background-color: #cbd5e1; bottom: 0; left: 0; position: absolute; right: 0; top: 0; transition: .4s; border-radius: 34px; }
        .slider:before { background-color: white; bottom: 3px; content: "☀️"; height: 28px; left: 3px; position: absolute; transition: .4s; width: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        input:checked + .slider { background-color: #334155; }
        input:checked + .slider:before { transform: translateX(36px); content: "🌙"; background: #0f172a; }

        .search-bar { display: flex; gap: 15px; margin-bottom: 40px; }
        input[type="text"] { flex: 1; padding: 22px; border-radius: 18px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 1.1rem; outline: none; }
        .btn-search { background: var(--accent); color: white; border: none; padding: 0 40px; border-radius: 18px; cursor: pointer; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        .res-container { background: var(--card); border-radius: 35px; padding: 45px; border: 1px solid var(--border); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1); width: 100%; box-sizing: border-box; }
        .res-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 35px; }
        .word-wrap h1 { margin: 0; font-size: 3.5rem; font-weight: 800; letter-spacing: -2px; line-height: 1; text-transform: capitalize; }
        .underline { height: 7px; background: #f59e0b; border-radius: 10px; width: 100%; margin-top: 5px; }
        .pos-badge { font-weight: 900; font-size: 0.8rem; color: var(--accent); text-transform: uppercase; margin-top: 10px; display: block; letter-spacing: 3px; }

        .main-star { width: 40px; height: 40px; fill: var(--star-inactive); cursor: pointer; transition: 0.3s; }
        .main-star.active { fill: var(--star-active) !important; transform: scale(1.1); }

        .arabic-box { background: var(--accent); padding: 35px; border-radius: 24px; margin-bottom: 30px; text-align: right; direction: rtl; color: white; }
        .arabic-text { font-family: 'Amiri', serif; font-size: 2.8rem; font-weight: bold; }

        .def-box { background: var(--def-bg); padding: 30px; border-radius: 20px; margin-bottom: 35px; border-left: 6px solid #f59e0b; }
        .def-tag { font-size: 0.7rem; font-weight: 900; text-transform: uppercase; color: #f59e0b; letter-spacing: 3px; margin-bottom: 12px; display: block; }
        .def-text { font-size: 1.2rem; line-height: 1.6; font-weight: 500; }

        .family-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 15px; width: 100%; }
        .family-square { background: var(--def-bg); border: 1px solid var(--border); border-radius: 20px; padding: 20px; min-height: 120px; }
        .square-label { font-size: 0.7rem; font-weight: 900; text-transform: uppercase; color: var(--accent); letter-spacing: 1.5px; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 8px; display: block; }

        .tag { display: inline-block; padding: 8px 16px; border-radius: 12px; margin: 4px; font-size: 0.85rem; font-weight: 700; background: var(--card); border: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
        .tag:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }
        .tag.syn { background: rgba(34, 197, 94, 0.1); color: #166534; border: none; }
        
        .rhyme-item { display: inline-block; margin: 4px; padding: 7px 15px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; font-weight: 800; color: var(--accent); cursor: pointer; }

        .loader { display: none; text-align: center; padding: 40px; font-weight: 900; font-size: 1.3rem; color: var(--accent); letter-spacing: 5px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
    </style>
</head>
<body data-theme="light">

    <aside id="sidebar">
        <div class="sidebar-tabs">
            <button class="tab-btn active" id="tab-history" onclick="setTab('history')">Cloud History</button>
            <button class="tab-btn" id="tab-bookmarks" onclick="setTab('bookmarks')">Cloud Pinned</button>
        </div>
        <div id="list-items"></div>
        <div class="sidebar-footer">
            <button class="btn-side" style="background:#f59e0b; color:white;" onclick="window.print()">PRINT STUDY SHEET</button>
            <button class="btn-side" style="background:var(--accent); color:white;" onclick="alert('Exporting Archive...')">EXPORT ARCHIVE</button>
            <button class="btn-side" style="background:var(--danger); color:white; font-size:0.6rem;" onclick="clearCloud()">PURGE CLOUD ARCHIVE</button>
        </div>
    </aside>

    <main>
        <div class="theme-switch-wrapper">
            <label class="theme-switch">
                <input type="checkbox" id="theme-toggle" onclick="toggleTheme()" />
                <div class="slider"></div>
            </label>
        </div>

        <div class="search-bar">
            <input type="text" id="wordInput" placeholder="Analyze word..." onkeypress="if(event.key === 'Enter') handleSearch()">
            <button class="btn-search" onclick="handleSearch()">SEARCH</button>
        </div>

        <div id="loader" class="loader">SYNCING ELITE ARCHIVE...</div>

        <div id="results" style="display:none;">
            <div class="res-container">
                <div class="res-header">
                    <div class="word-wrap">
                        <h1 id="r-word"></h1>
                        <div class="underline"></div>
                        <span class="pos-badge" id="r-pos"></span>
                    </div>
                    <svg class="main-star" id="mainStar" onclick="toggleBookmark()" viewBox="0 0 24 24">
                        <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
                    </svg>
                </div>
                <div class="arabic-box"><div class="arabic-text" id="r-trans"></div></div>
                <div class="def-box"><span class="def-tag">Definition</span><div class="def-text" id="r-def"></div></div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px;">
                    <div style="grid-column: span 2;">
                        <h3 style="text-transform:uppercase; letter-spacing:2px; font-size:0.8rem; opacity:0.6;">Symmetrical Family Tree</h3>
                        <div id="r-family-grid" class="family-grid"></div>
                    </div>
                    <div>
                        <h3>Linguistic Info</h3>
                        <p><strong>Syllables:</strong> <span id="r-syll" style="letter-spacing: 2px; font-weight: 800;"></span></p>
                        <p id="r-etym" style="font-size:0.9rem; line-height: 1.6; opacity: 0.8;"></p>
                    </div>
                    <div>
                        <h3>Thesaurus & Rhymes</h3>
                        <div id="r-syn" style="margin-bottom: 12px;"></div>
                        <div id="r-rhyme" style="margin-top:20px;"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyBGVL3ewn7589d9yX2qbbpde9DTVCWTyMc", 
            databaseURL: "https://lingustichub-default-rtdb.firebaseio.com/", 
            projectId: "lingustichub" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const DICT_KEY = "7c14969b-2038-4024-ade3-ad9680fd94ff";
        const THES_KEY = "9e966fec-f0d8-497c-97f3-dd9938d108a0";
        const GOOGLE_KEY = "AIzaSyDAmT4Bl0iwFJtKwq-sRg7Fl9ChW8X_x08";

        let history = [], bookmarks = [], lastWord = "", currentTab = 'history';

        async function handleSearch(manualWord = null) {
            const word = (manualWord || document.getElementById('wordInput').value).trim().toLowerCase();
            if(!word) return;
            lastWord = word;
            document.getElementById('results').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            try {
                const trRes = await fetch(`https://translation.googleapis.com/language/translate/v2?key=${GOOGLE_KEY}`, {
                    method: 'POST', body: JSON.stringify({ q: word, target: 'ar', format: 'text' })
                });
                const trData = await trRes.json();
                const [dRes, tRes, rRes] = await Promise.all([
                    fetch(`https://www.dictionaryapi.com/api/v3/references/collegiate/json/${word}?key=${DICT_KEY}`),
                    fetch(`https://www.dictionaryapi.com/api/v3/references/thesaurus/json/${word}?key=${THES_KEY}`),
                    fetch(`https://api.datamuse.com/words?rel_rhy=${word}&max=8`)
                ]);
                
                const data = { 
                    word, trans: trData.data.translations[0].translatedText, 
                    dict: await dRes.json(), thes: await tRes.json(), rhymes: await rRes.json() 
                };
                
                db.ref('cloud_history/' + word).set({ timestamp: Date.now(), data: data });
                render(data);
                updateStarUI();
            } catch (e) { console.error(e); }
            finally { document.getElementById('loader').style.display = 'none'; }
        }

        function render(data) {
            const d = data.dict[0];
            document.getElementById('results').style.display = 'block';
            document.getElementById('r-word').innerText = data.word;
            document.getElementById('r-trans').innerText = data.trans;
            document.getElementById('r-pos').innerText = d.fl || "";
            document.getElementById('r-def').innerText = d.shortdef ? d.shortdef[0] : "N/A";
            document.getElementById('r-syll').innerText = d.hwi?.hw?.replace(/\*/g, '·') || data.word;
            document.getElementById('r-etym').innerText = d.et ? d.et[0][1].replace(/\{.*?\}/g, '') : "";

            const grid = document.getElementById('r-family-grid'); grid.innerHTML = "";
            let groups = { noun: [], adjective: [], adverb: [], verb: [], related: [] };
            
            data.dict.forEach(entry => {
                const head = entry.hwi?.hw?.replace(/\*/g, '').toLowerCase();
                const type = (entry.fl || "related").toLowerCase();
                if(head && head !== data.word && groups[type]) groups[type].push(head);
                if(entry.uros) entry.uros.forEach(u => {
                    const c = u.ure.replace(/\*/g, '').toLowerCase();
                    const utype = (u.fl || "related").toLowerCase();
                    if (c !== data.word && groups[utype]) groups[utype].push(c);
                });
            });

            for (let [type, members] of Object.entries(groups)) {
                if (members.length > 0) {
                    const sq = document.createElement('div'); sq.className = 'family-square';
                    sq.innerHTML = `<span class="square-label">${type}</span><div style="display:flex; flex-wrap:wrap; gap:5px;"></div>`;
                    const inner = sq.querySelector('div');
                    [...new Set(members)].slice(0, 8).forEach(m => {
                        const t = document.createElement('span'); t.className = 'tag'; t.innerText = m;
                        t.onclick = () => handleSearch(m); inner.appendChild(t);
                    });
                    grid.appendChild(sq);
                }
            }
            const synBox = document.getElementById('r-syn'); synBox.innerHTML = "";
            if(data.thes[0]?.meta?.syns) data.thes[0].meta.syns[0].slice(0, 10).forEach(s => {
                const t = document.createElement('span'); t.className = 'tag syn'; t.innerText = s;
                t.onclick = () => handleSearch(s); synBox.appendChild(t);
            });
            document.getElementById('r-rhyme').innerHTML = data.rhymes.map(r => `<span class="rhyme-item" onclick="handleSearch('${r.word}')">${r.word}</span>`).join('');
        }

        db.ref('cloud_history').limitToLast(50).on('value', (s) => {
            const d = s.val() || {};
            history = Object.keys(d).sort((a,b) => d[b].timestamp - d[a].timestamp);
            updateSidebar();
        });

        db.ref('cloud_pinned').on('value', (s) => {
            bookmarks = Object.keys(s.val() || {});
            updateSidebar(); updateStarUI();
        });

        function toggleBookmark() {
            if (bookmarks.includes(lastWord)) db.ref('cloud_pinned/' + lastWord).remove();
            else db.ref('cloud_pinned/' + lastWord).set(true);
        }

        function updateSidebar() {
            const c = document.getElementById('list-items'); c.innerHTML = "";
            const l = currentTab === 'history' ? history : bookmarks;
            l.forEach(w => {
                const d = document.createElement('div'); d.className = 'list-item';
                d.innerHTML = `<span class="item-text" onclick="handleSearch('${w}')">${w}</span>
                <svg class="action-icon del-svg" onclick="event.stopPropagation(); db.ref('cloud_'+currentTab+'/'+'${w}').remove()" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>`;
                c.appendChild(d);
            });
        }

        function updateStarUI() { document.getElementById('mainStar').classList.toggle('active', bookmarks.includes(lastWord)); }
        function setTab(t) { currentTab = t; document.getElementById('tab-history').classList.toggle('active', t==='history'); document.getElementById('tab-bookmarks').classList.toggle('active', t==='bookmarks'); updateSidebar(); }
        function toggleTheme() { document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }
        function clearCloud() { if(confirm("Wipe Universal Cloud Archive?")) db.ref('/').remove(); }
        updateSidebar();
    </script>
</body>
</html>
