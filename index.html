        #sidebar { 
            width: 280px; min-width: 280px; background: var(--sidebar);

        #sidebar.collapsed { margin-left: -280px; }

        .sidebar-tabs { display: flex; border-bottom: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; cursor: pointer; color: var(--text); font-weight: 800; opacity: 0.3; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; }

        .sidebar-footer { padding: 15px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 6px; }

        main { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; position: relative; }
        
        #menu-toggle {

        .content-wrapper { width: 100%; max-width: 800px; margin-top: 50px; } 
        
        .search-container { position: relative; display: flex; gap: 12px; width: 100%; margin-bottom: 25px; }
        .search-wrapper { position: relative; flex: 1; display: flex; }
        input[type="text"] { 
            width: 100%; padding: 15px 45px 15px 20px; border-radius: 16px; border: 1px solid var(--border);

        .main-star.active { fill: var(--star-active) !important; }

        #r-word { margin: 0; font-size: 1.8rem; font-weight: 800; letter-spacing: -0.5px; text-transform: capitalize; overflow-wrap: anywhere; }

        .arabic-text { font-family: 'Amiri', serif; font-size: 2.2rem; font-weight: bold; line-height: 1.2; }

        .antonym-item { display: inline-block; margin: 2px; padding: 4px 10px; background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px; font-size: 0.75rem; font-weight: 700; color: #b45309; cursor: pointer; }

        #history-count, #pinned-count { font-size: 0.65rem; margin-left: 8px; padding: 3px 8px; border-radius: 12px; font-weight: 800; display: inline-flex; align-items: center; justify-content: center; vertical-align: middle; }

        .matrix-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; background: var(--bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-top: 20px; }

        // --- ROOT EXTRACTOR FIX ---
        function stripToDeepestRoot(word) {
            if (!word) return "";
            let root = word.toLowerCase();
            // Expanded list of suffixes to securely trim long words like "reinforcement"
            const suffixes = ['ization', 'ability', 'fulness', 'ation', 'ement', 'ness', 'tion', 'sion', 'ment', 'able', 'ible', 'ally', 'ive', 'ing', 'est', 'ous', 'ful', 'ly', 'er', 'ed', 'al', 'ic', 'y', 's'];
            
            for (let suf of suffixes) {
                if (root.endsWith(suf) && root.length - suf.length >= 3) {
                    root = root.slice(0, -suf.length);
                    break; 
                }
            }
            return root;
        }

                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ q: word, target: 'ar' })
                    }).catch(() => null),
                    fetch(`./by-letter-enriched/${firstLetter}.json`).catch(() => null)

                document.getElementById('loader').style.display = 'none';

                let data = null;

                    alert("Word not found in deep archive.");

                        document.getElementById('r-trans').innerText = transData.data.translations[0].translatedText;
                        arabicBox.style.display = 'block';

                        arabicBox.style.display = 'none';

                        if (entry.synonyms) entry.synonyms.forEach(s => allSynonyms.add(s));

                        const pos = entry.partOfSpeech;

                        return `<div style="margin-bottom: 8px; font-size: 0.9rem; color: var(--text);">

                    const mergedSyns = new Set([...localSyns, ...allSynonyms]);
