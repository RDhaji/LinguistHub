<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinguistHub | Gold Master</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

    <style>
        :root { 
            --bg: #f1f5f9; --card: #ffffff; --text: #0f172a; --accent: #2563eb; 
            --border: #e2e8f0; --sidebar: #ffffff; --item-hover: #f8fafc; 
            --star-active: #f59e0b; --star-inactive: #cbd5e1; --danger: #f43f5e;
            --shadow: 0 4px 20px -2px rgb(0 0 0 / 0.05);
        }
        [data-theme="dark"] { 
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #3b82f6; 
            --border: #334155; --sidebar: #0f172a; --item-hover: #1e293b;
        }
        
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; transition: 0.3s; }
        
        /* Sidebar Architecture */
        #sidebar { 
            width: 280px; min-width: 280px; background: var(--sidebar); 
            border-right: 1px solid var(--border); display: flex; flex-direction: column; 
            z-index: 10; transition: transform 0.3s ease, margin-left 0.3s ease;
        }
        #sidebar.collapsed { margin-left: -280px; }

        .sidebar-tabs { display: flex; border-bottom: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; cursor: pointer; color: var(--text); font-weight: 800; opacity: 0.3; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; }
        .tab-btn.active { opacity: 1; border-bottom: 3px solid var(--accent); }
        #list-items { flex: 1; overflow-y: auto; }
        .list-item { padding: 10px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; cursor: pointer; transition: 0.2s; gap: 12px; }
        .list-item:hover { background: var(--item-hover); }
        .item-text { flex: 1; font-weight: 600; font-size: 0.9rem; text-transform: capitalize; }
        
        .sidebar-footer { padding: 15px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 6px; }
        .btn-side { width: 100%; padding: 10px; border-radius: 10px; border: none; cursor: pointer; font-weight: 800; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; }

        /* Main View Architecture */
        main { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; position: relative; }
        
        #menu-toggle {
            position: absolute; left: 20px; top: 20px; background: var(--card); border: 1px solid var(--border);
            border-radius: 10px; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: var(--shadow); z-index: 20; color: var(--text); font-size: 1.1rem;
        }

        .theme-toggle { position: absolute; right: 20px; top: 20px; background: none; border: none; font-size: 1.4rem; cursor: pointer; z-index: 20; }

        .content-wrapper { width: 100%; max-width: 800px; margin-top: 50px; } 
        
        /* Search Component */
        .search-container { position: relative; display: flex; gap: 12px; width: 100%; margin-bottom: 25px; }
        .search-wrapper { position: relative; flex: 1; display: flex; }
        input[type="text"] { 
            width: 100%; padding: 15px 45px 15px 20px; border-radius: 16px; border: 1px solid var(--border); 
            background: var(--card); color: var(--text); font-size: 1.15rem; outline: none; box-shadow: var(--shadow);
        }
        .clear-search { 
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; 
            color: var(--star-inactive); font-weight: bold; font-size: 0.9rem; display: none; z-index: 5;
        }

        .btn-search { background: var(--accent); color: white; border: none; padding: 0 30px; border-radius: 16px; cursor: pointer; font-weight: 800; text-transform: uppercase; font-size: 0.75rem; }

        /* Result Component */
        .res-container { background: var(--card); border-radius: 24px; padding: 25px; border: 1px solid var(--border); box-shadow: var(--shadow); width: 100%; box-sizing: border-box; }
        .res-header { display: flex; align-items: center; gap: 15px; margin-bottom: 12px; }
        
        .main-star { width: 26px !important; height: 26px !important; min-width: 26px; fill: var(--star-inactive); cursor: pointer; transition: 0.2s; }
        .main-star.active { fill: var(--star-active) !important; }
        
        .underline { height: 4px; background: #f59e0b; border-radius: 10px; width: 60px; margin-top: 4px; }
        
        /* Compact Output Typography */
        #r-word { 
    margin: 0; 
    font-size: 1.8rem;      /* Was 1.1rem */
    font-weight: 800;       
    letter-spacing: -0.5px; 
    text-transform: capitalize; 
    overflow-wrap: anywhere; /* Essential for mobile safety */
        }
        /* Arabic Bar Component */
        .arabic-box { background: var(--accent); padding: 8px 20px; border-radius: 14px; margin-bottom: 15px; text-align: center; direction: rtl; color: white; max-width: fit-content; margin-left: auto; margin-right: auto; }
/* 2. Arabic Translation - Increased to 2.2rem for clarity */
.arabic-text { 
    font-family: 'Amiri', serif; 
    font-size: 2.2rem;      /* Was 1.2rem */
    font-weight: bold; 
    line-height: 1.2;
}
        /* Synonyms & Tags */
        .synonym-item { display: inline-block; margin: 2px; padding: 4px 10px; background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px; font-size: 0.75rem; font-weight: 700; color: #b45309; cursor: pointer; }
        [data-theme="dark"] .synonym-item { background: #451a03; border-color: #78350f; color: #fcd34d; }

        .family-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-top: 15px; }
        .family-square { background: var(--bg); border: 1px solid var(--border); border-radius: 14px; padding: 10px; min-height: 70px; }
        .tag { display: inline-block; padding: 4px 8px; border-radius: 6px; margin: 2px; font-size: 0.7rem; font-weight: 700; background: var(--card); border: 1px solid var(--border); cursor: pointer; color: var(--text); }
        .rhyme-item { display: inline-block; margin: 2px; padding: 4px 8px; background: var(--card); border: 1px solid var(--border); border-radius: 6px; font-size: 0.7rem; font-weight: 800; color: var(--accent); cursor: pointer; }

        #r-def { background: var(--bg); padding: 15px; border-radius: 14px; border-left: 5px solid #f59e0b; margin-bottom: 15px; font-size: 0.95rem; line-height: 1.4; }
        
        #login-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15,23,42,0.98); z-index:9999; display:none; flex-direction:column; align-items:center; justify-content:center; color:white; text-align:center; }
        .loader { display: none; text-align: center; padding: 20px; font-weight: 900; font-size: 1rem; color: var(--accent); letter-spacing: 5px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    </style>
</head>
<body data-theme="light">

    <div id="login-overlay">
        <h1 style="font-size:3rem; letter-spacing:-2px; margin-bottom:10px;">LinguistHub</h1>
        <button onclick="login()" style="padding:18px 45px; border-radius:45px; border:none; background:#2563eb; color:white; font-weight:800; cursor:pointer;">OPEN ARCHIVE</button>
    </div>

    <aside id="sidebar">
        <div class="sidebar-tabs">
            <button class="tab-btn active" id="tab-history" onclick="setTab('history')">History</button>
            <button class="tab-btn" id="tab-bookmarks" onclick="setTab('bookmarks')">Pinned</button>
        </div>
        <div id="list-items"></div>
        <div class="sidebar-footer">
            <button class="btn-side" style="background:#f59e0b; color:white;" onclick="window.print()">PRINT STUDY</button>
            <button class="btn-side" style="background:var(--accent); color:white;" onclick="exportData()">EXPORT</button>
            <button class="btn-side" style="background:var(--danger); color:white;" onclick="clearCloud()">PURGE</button>
        </div>
    </aside>

    <main>
        <button id="menu-toggle" onclick="toggleSidebar()">☰</button>
        <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
        
        <div class="content-wrapper">
            <div class="search-container">
                <div class="search-wrapper">
                    <input type="text" id="wordInput" placeholder="Analyze word..." onkeypress="if(event.key === 'Enter') handleSearch()" oninput="toggleClearBtn()">
                    <span id="clearBtn" class="clear-search" onclick="clearSearchInput()">✕</span>
                </div>
                <button class="btn-search" onclick="handleSearch()">SEARCH</button>
            </div>

            <div id="loader" class="loader">SYNCING...</div>

            <div id="results" style="display:none;">
                <div class="res-container">
                    <div class="res-header">
                        <div style="display: flex; flex-direction: column; width: 100%;">
                            <div style="display: flex; align-items: center; gap: 15px;">
                                <h1 id="r-word"></h1>
                                <button style="background:none; border:none; cursor:pointer; padding:0;" onclick="speak('en')">
                                    <svg style="width:20px; fill:var(--accent);" viewBox="0 0 24 24"><path d="M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18.01,19.86 21,16.28 21,12C21,7.72 18.01,4.14 14,3.23M16.5,12C16.5,10.23 15.5,8.71 14,7.97V16.02C15.5,15.29 16.5,13.77 16.5,12M3,9V15H7L12,20V4L7,9H3Z"/></svg>
                                </button>
                                <svg class="main-star" id="mainStar" onclick="toggleBookmark()" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                            </div>
                            <div class="underline"></div>
                            <span id="r-pos" style="font-weight:900; font-size:0.6rem; color:var(--accent); text-transform:uppercase; margin-top:6px; display:block; letter-spacing:1.5px;"></span>
                        </div>
                    </div>

                    <div class="arabic-box">
                        <div class="arabic-text" id="r-trans"></div>
                    </div>

                    <div id="r-def"></div>

                    <div style="display: grid; grid-template-columns: 1fr; gap: 15px;">
                        <div><div id="r-family-grid" class="family-grid"></div></div>
                        <div style="display: flex; gap: 20px; border-top: 1px solid var(--border); padding-top: 12px;">
                            <div style="flex: 1;">
                                <h4 style="margin-bottom:6px; opacity:0.6; font-size: 0.6rem; text-transform: uppercase;">Archive</h4>
                                <p style="font-size:0.8rem; margin:0;"><strong>Syll:</strong> <span id="r-syll" style="color:var(--accent);"></span></p>
                                <p id="r-etym" style="font-size:0.7rem; margin-top:4px; line-height:1.3; opacity:0.8; font-style: italic;"></p>
                            </div>
                            <div style="flex: 1;">
                                <h4 style="margin-bottom:8px; opacity:0.6; font-size: 0.65rem; text-transform: uppercase;">Rhyme Index</h4>
                                <div id="r-rhyme" style="margin-bottom: 12px;"></div>
                                <h4 style="margin-bottom:8px; opacity:0.6; font-size: 0.65rem; text-transform: uppercase;">Synonyms</h4>
                                <div id="r-syns"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 1. CONFIGURATION
        const firebaseConfig = { 
            apiKey: "AIzaSyBGVL3ewn7589d9yX2qbbpde9DTVCWTyMc", 
            authDomain: "lingustichub.firebaseapp.com", 
            databaseURL: "https://lingustichub-default-rtdb.firebaseio.com/", 
            projectId: "lingustichub" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const DICT_KEY = "7c14969b-2038-4024-ade3-ad9680fd94ff";
        const THES_KEY = "9e966fec-f0d8-497c-97f3-dd9938d108a0";
        const GOOGLE_KEY = "AIzaSyDAmT4Bl0iwFJtKwq-sRg7Fl9ChW8X_x08";

        let history = [], bookmarks = [], lastWord = "", lastTrans = "", currentTab = 'history', userPath = "";

        // 2. UI CONTROLLER
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }
        function toggleTheme() { 
            const c = document.body.getAttribute('data-theme'); 
            document.body.setAttribute('data-theme', c === 'dark' ? 'light' : 'dark'); 
        }

        function toggleClearBtn() {
            const input = document.getElementById('wordInput');
            const btn = document.getElementById('clearBtn');
            btn.style.display = input.value.length > 0 ? 'block' : 'none';
        }

        function clearSearchInput() {
            const input = document.getElementById('wordInput');
            input.value = "";
            toggleClearBtn();
            input.focus();
        }

        // 3. DATA SYNC
        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-overlay').style.display = 'none';
                userPath = 'users/' + user.uid;
                db.ref(userPath + '/history').on('value', s => {
                    const data = s.val() || {};
                    history = Object.keys(data).sort((a,b) => data[b].timestamp - data[a].timestamp);
                    updateSidebar();
                });
                db.ref(userPath + '/bookmarks').on('value', s => {
                    bookmarks = Object.keys(s.val() || {});
                    updateSidebar();
                    updateStarUI();
                });
            } else {
                document.getElementById('login-overlay').style.display = 'flex';
            }
        });

        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider).catch(e => {
                firebase.auth().signInWithRedirect(provider);
            });
        }

        // 4. ENGINE
        async function handleSearch(manual = null) {
            const w = (manual || document.getElementById('wordInput').value).trim().toLowerCase();
            if(!w || !userPath) return;
            lastWord = w; 
            document.getElementById('wordInput').value = w;
            toggleClearBtn();
            document.getElementById('results').style.display = 'none'; 
            document.getElementById('loader').style.display = 'block';
            try {
                const tr = await fetch(`https://translation.googleapis.com/language/translate/v2?key=${GOOGLE_KEY}`, { method: 'POST', body: JSON.stringify({ q: w, target: 'ar', format: 'text' }) });
                const trD = await tr.json();
                const [d, t, r] = await Promise.all([ 
                    fetch(`https://www.dictionaryapi.com/api/v3/references/collegiate/json/${w}?key=${DICT_KEY}`), 
                    fetch(`https://www.dictionaryapi.com/api/v3/references/thesaurus/json/${w}?key=${THES_KEY}`),
                    fetch(`https://api.datamuse.com/words?rel_rhy=${w}&max=6`)
                ]);
                const data = { word: w, trans: trD.data.translations[0].translatedText, dict: await d.json(), thes: await t.json(), rhymes: await r.json() };
                db.ref(userPath + '/history/' + w).set({ timestamp: Date.now(), data: data });
                render(data); updateStarUI();
            } catch (e) { console.error(e); } finally { document.getElementById('loader').style.display = 'none'; }
        }

        // 5. RENDERER
        function render(data) {
            const d = data.dict[0];
            document.getElementById('results').style.display = 'block';
            document.getElementById('r-word').innerText = data.word;
            document.getElementById('r-trans').innerText = data.trans;
            document.getElementById('r-pos').innerText = d ? (d.fl || "word") : "word";
            
            const definition = d?.shortdef ? d.shortdef[0] : (data.thes[0]?.shortdef ? data.thes[0].shortdef[0] : "Definition not available.");
            document.getElementById('r-def').innerText = definition;
            
            document.getElementById('r-syll').innerText = d?.hwi?.hw?.replace(/\*/g, '·') || data.word;
            document.getElementById('r-etym').innerText = d?.et ? d.et[0][1].replace(/\{.*?\}/g, '') : "Origin tracking preserved.";
            
            document.getElementById('r-rhyme').innerHTML = data.rhymes.map(r => `<span class="rhyme-item" onclick="handleSearch('${r.word}')">${r.word}</span>`).join('');
            
            // Synonyms Logic
            const synContainer = document.getElementById('r-syns');
            synContainer.innerHTML = "";
            if (data.thes && data.thes[0] && data.thes[0].meta && data.thes[0].meta.syns) {
                const synList = data.thes[0].meta.syns[0].slice(0, 10); 
                synList.forEach(syn => {
                    const span = document.createElement('span');
                    span.className = 'synonym-item';
                    span.innerText = syn;
                    span.onclick = () => handleSearch(syn);
                    synContainer.appendChild(span);
                });
            } else {
                synContainer.innerHTML = "<span style='font-size:0.8rem; opacity:0.5;'>No synonyms in archive.</span>";
            }

            // POS Grid logic
            const grid = document.getElementById('r-family-grid'); 
            grid.innerHTML = "";
            let groups = { noun: [], adjective: [], verb: [] };
            if(Array.isArray(data.dict)) {
                data.dict.forEach(entry => {
                    const head = entry.hwi?.hw?.replace(/\*/g, '').toLowerCase();
                    const type = (entry.fl || "related").toLowerCase();
                    if(head && head !== data.word && groups[type]) groups[type].push(head);
                });
            }
            for (let [type, members] of Object.entries(groups)) {
                if (members.length > 0) {
                    const sq = document.createElement('div'); sq.className = 'family-square';
                    sq.innerHTML = `<span style="font-size:0.65rem; font-weight:900; text-transform:uppercase; color:var(--accent); display:block; margin-bottom:12px;">${type}</span>`;
                    [...new Set(members)].slice(0, 6).forEach(m => {
                        const t = document.createElement('span'); t.className = 'tag'; t.innerText = m; t.onclick = () => handleSearch(m); sq.appendChild(t);
                    });
                    grid.appendChild(sq);
                }
            }
        }

        // 6. FEATURES
        function speak(l) { 
            if(l === 'ar') return;
            const u = new SpeechSynthesisUtterance(lastWord); 
            u.lang = 'en-US'; 
            window.speechSynthesis.speak(u); 
        }

        function toggleBookmark() { 
            if (bookmarks.includes(lastWord)) db.ref(userPath + '/bookmarks/' + lastWord).remove();
            else db.ref(userPath + '/bookmarks/' + lastWord).set(true); 
        }

        function updateStarUI() { 
            const s = document.getElementById('mainStar'); 
            if (bookmarks.includes(lastWord)) s.classList.add('active'); else s.classList.remove('active'); 
        }

        function updateSidebar() {
            const c = document.getElementById('list-items'); c.innerHTML = "";
            const list = currentTab === 'history' ? history : bookmarks;
            list.forEach(w => {
                const item = document.createElement('div'); item.className = 'list-item';
                item.innerHTML = `<span class="item-text" onclick="handleSearch('${w}')">${w}</span>
                <span style="color:#cbd5e1; cursor:pointer;" onclick="event.stopPropagation(); db.ref(userPath+'/'+currentTab+'/'+'${w}').remove()">✕</span>`;
                c.appendChild(item);
            });
        }

        function setTab(t) { 
            currentTab = t; 
            document.getElementById('tab-history').classList.toggle('active', t==='history'); 
            document.getElementById('tab-bookmarks').classList.toggle('active', t==='bookmarks'); 
            updateSidebar(); 
        }

        function clearCloud() { 
            if(confirm("Permanently purge cloud history?")) db.ref(userPath).remove(); 
        }

        function exportData() { 
            const b = new Blob([JSON.stringify({history, bookmarks}, null, 2)], {type: 'application/json'}); 
            const a = document.createElement('a'); a.href = URL.createObjectURL(b); 
            a.download = 'LinguistHub_Backup.json'; a.click(); 
        }
    </script>
</body>
</html>
