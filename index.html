<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinguistHub | Pro Elite Master</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --accent: #2563eb;
            --border: #e2e8f0; --sidebar: #ffffff; --item-hover: #f1f5f9; --def-bg: #f8fafc;
            --star-active: #f59e0b; --star-inactive: #cbd5e1; --danger: #f43f5e;
        }
        [data-theme="dark"] {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #3b82f6;
            --border: #334155; --sidebar: #0f172a; --item-hover: #1e293b; --def-bg: #334155;
        }

        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; transition: 0.3s; }
        
        #sidebar { width: 30%; min-width: 300px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; }
        .sidebar-tabs { display: flex; border-bottom: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 20px; border: none; background: none; cursor: pointer; color: var(--text); font-weight: 800; opacity: 0.3; transition: 0.3s; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; }
        .tab-btn.active { opacity: 1; border-bottom: 3px solid var(--accent); }
        
        #list-items { flex: 1; overflow-y: auto; }
        .list-item { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; cursor: pointer; transition: 0.2s; gap: 10px; }
        .list-item:hover { background: var(--item-hover); }
        .item-text { flex: 1; font-weight: 600; font-size: 0.95rem; text-transform: capitalize; }

        .action-icon { width: 18px; height: 18px; fill: var(--star-inactive); transition: 0.2s; cursor: pointer; }
        .star-svg.active { fill: var(--star-active) !important; }
        .del-svg:hover { fill: var(--danger) !important; }

        .sidebar-footer { padding: 20px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
        .btn-side { padding: 12px; border-radius: 12px; border: none; cursor: pointer; font-weight: 800; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; }
        .btn-download { background: var(--accent); color: white; }
        .btn-print { background: #f59e0b; color: white; }

        main { flex: 1; overflow-y: auto; padding: 40px; }
        .theme-switch-wrapper { display: flex; align-items: center; justify-content: flex-end; margin-bottom: 30px; }
        .theme-switch { display: inline-block; height: 34px; position: relative; width: 70px; }
        .theme-switch input { display: none; }
        .slider { background-color: #cbd5e1; bottom: 0; cursor: pointer; left: 0; position: absolute; right: 0; top: 0; transition: .4s; border-radius: 34px; }
        .slider:before { background-color: white; bottom: 3px; content: "☀️"; height: 28px; left: 3px; position: absolute; transition: .4s; width: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        input:checked + .slider { background-color: #334155; }
        input:checked + .slider:before { transform: translateX(36px); content: "🌙"; background: #0f172a; }

        .search-bar { display: flex; gap: 15px; margin-bottom: 40px; }
        input[type="text"] { flex: 1; padding: 22px; border-radius: 18px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 1.1rem; outline: none; }
        .btn-search { background: var(--accent); color: white; border: none; padding: 0 40px; border-radius: 18px; cursor: pointer; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        .res-container { background: var(--card); border-radius: 35px; padding: 45px; border: 1px solid var(--border); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1); width: 100%; box-sizing: border-box; }
        .res-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 35px; }
        .word-wrap { position: relative; display: flex; flex-direction: column; align-items: flex-start; }
        .word-wrap h1 { margin: 0; font-size: 3.5rem; font-weight: 800; letter-spacing: -2px; line-height: 1; text-transform: capitalize; }
        .underline { height: 7px; background: #f59e0b; border-radius: 10px; width: 100%; margin-top: 5px; }
        .pos-badge { font-weight: 900; font-size: 0.8rem; color: var(--accent); text-transform: uppercase; margin-top: 10px; display: block; letter-spacing: 3px; }

        .main-star { width: 40px; height: 40px; fill: var(--star-inactive); cursor: pointer; transition: 0.3s; }
        .main-star.active { fill: var(--star-active) !important; transform: scale(1.1); }

        .arabic-box { background: var(--accent); padding: 35px; border-radius: 24px; margin-bottom: 30px; text-align: right; direction: rtl; color: white; }
        .arabic-text { font-family: 'Amiri', serif; font-size: 2.8rem; font-weight: bold; }

        .def-box { background: var(--def-bg); padding: 30px; border-radius: 20px; margin-bottom: 35px; border-left: 6px solid #f59e0b; }
        .def-tag { font-size: 0.7rem; font-weight: 900; text-transform: uppercase; color: #f59e0b; letter-spacing: 3px; margin-bottom: 12px; display: block; }
        .def-text { font-size: 1.2rem; line-height: 1.6; font-weight: 500; }

        /* FIXED 3-COLUMN SYMMETRY */
        .family-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 15px; width: 100%; }
        .family-square { background: var(--def-bg); border: 1px solid var(--border); border-radius: 20px; padding: 20px; }
        .square-label { font-size: 0.7rem; font-weight: 900; text-transform: uppercase; color: var(--accent); letter-spacing: 1.5px; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 8px; display: block; }

        .tag { display: inline-block; padding: 8px 16px; border-radius: 12px; margin: 4px; font-size: 0.85rem; font-weight: 700; background: var(--card); border: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
        .tag:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }
        .tag.syn { background: rgba(34, 197, 94, 0.1); color: #166534; border: none; }
        .tag.ant { background: rgba(239, 68, 68, 0.1); color: #b91c1c; border: none; }
        
        .rhyme-item { display: inline-block; margin: 5px; padding: 7px 15px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; font-weight: 800; color: var(--accent); cursor: pointer; }

        #exportModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); padding: 40px; border-radius: 30px; width: 450px; text-align: center; border: 1px solid var(--border); }
        .modal-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border-radius: 14px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-weight: 800; cursor: pointer; }

        .loader { display: none; text-align: center; padding: 40px; font-weight: 900; font-size: 1.3rem; color: var(--accent); letter-spacing: 5px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }

        @media print {
            #sidebar, .search-bar, .theme-switch-wrapper, #exportModal, #loader { display: none !important; }
            body { background: white !important; color: black !important; overflow: visible !important; height: auto !important; }
            main { padding: 0 !important; width: 100% !important; margin: 0 !important; }
            .res-container { box-shadow: none !important; border: 1px solid #000 !important; border-radius: 0 !important; padding: 20px !important; }
            .underline { background: #f59e0b !important; -webkit-print-color-adjust: exact; }
            @page { margin: 1cm; size: A4; }
        }
    </style>
</head>
<body data-theme="light">

    <div id="exportModal">
        <div class="modal-content">
            <h2 style="margin-top:0;">Download Archive</h2>
            <button class="modal-btn" onclick="exportArchive('history')">Download History (A4 Full Mode)</button>
            <button class="modal-btn" onclick="exportArchive('pinned')">Download Pinned (A4 Full Mode)</button>
            <button class="modal-btn" style="background:none; border:none; opacity:0.5;" onclick="closeModal()">Cancel</button>
        </div>
    </div>

    <aside id="sidebar">
        <div class="sidebar-tabs">
            <button class="tab-btn active" id="tab-history" onclick="setTab('history')">History</button>
            <button class="tab-btn" id="tab-bookmarks" onclick="setTab('bookmarks')">Pinned</button>
        </div>
        <div id="list-items"></div>
        <div class="sidebar-footer">
            <button class="btn-side btn-print" onclick="window.print()">Print Study Sheet</button>
            <button class="btn-side btn-download" onclick="openModal()">Export HTML Lexicon</button>
            <button onclick="clearAll()" style="background:none; border:none; color:var(--danger); font-weight:bold; font-size:0.6rem; cursor:pointer; opacity:0.5; margin-top:5px;">CLEAR ALL ARCHIVE</button>
        </div>
    </aside>

    <main>
        <div class="theme-switch-wrapper">
            <label class="theme-switch">
                <input type="checkbox" id="theme-toggle" onclick="toggleTheme()" />
                <div class="slider"></div>
            </label>
        </div>

        <div class="search-bar">
            <input type="text" id="wordInput" placeholder="Analyze word..." onkeypress="if(event.key === 'Enter') handleSearch()">
            <button class="btn-search" onclick="handleSearch()">SEARCH</button>
        </div>

        <div id="loader" class="loader">SYNCING ARCHIVE...</div>

        <div id="results" style="display:none;">
            <div class="res-container">
                <div class="res-header">
                    <div class="word-wrap">
                        <h1 id="r-word"></h1>
                        <div class="underline"></div>
                        <span class="pos-badge" id="r-pos"></span>
                    </div>
                    <svg class="main-star" id="mainStar" onclick="toggleBookmark()" viewBox="0 0 24 24">
                        <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
                    </svg>
                </div>
                <div class="arabic-box"><div class="arabic-text" id="r-trans"></div></div>
                <div class="def-box"><span class="def-tag">Definition</span><div class="def-text" id="r-def"></div></div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px;">
                    <div style="grid-column: span 2;">
                        <h3 style="text-transform:uppercase; letter-spacing:2px; font-size:0.8rem; opacity:0.6;">Symmetrical Family Tree</h3>
                        <div id="r-family-grid" class="family-grid"></div>
                    </div>
                    <div>
                        <h3 style="text-transform:uppercase; letter-spacing:2px; font-size:0.8rem; opacity:0.6;">Linguistic Info</h3>
                        <p><strong>Syllables:</strong> <span id="r-syll" style="letter-spacing: 2px; font-weight: 800;"></span></p>
                        <p id="r-etym" style="font-size:0.9rem; line-height: 1.6; opacity: 0.8;"></p>
                    </div>
                    <div>
                        <h3 style="text-transform:uppercase; letter-spacing:2px; font-size:0.8rem; opacity:0.6;">Thesaurus & Rhymes</h3>
                        <div id="r-syn" style="margin-bottom: 12px;"></div>
                        <div id="r-ant"></div>
                        <div id="r-rhyme" style="margin-top:20px;"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // API CONFIGURATION
        const DICT_KEY = "7c14969b-2038-4024-ade3-ad9680fd94ff";
        const THES_KEY = "9e966fec-f0d8-497c-97f3-dd9938d108a0";
        const GOOGLE_KEY = "AIzaSyDAmT4Bl0iwFJtKwq-sRg7Fl9ChW8X_x08";

        let history = JSON.parse(localStorage.getItem('lh_history')) || [];
        let bookmarks = JSON.parse(localStorage.getItem('lh_bookmarks')) || [];
        let archive = JSON.parse(localStorage.getItem('lh_archive')) || {}; 
        let currentTab = 'history', lastWord = "";

        async function handleSearch(manualWord = null) {
            const word = (manualWord || document.getElementById('wordInput').value).trim().toLowerCase();
            if(!word) return;
            
            // Immediate UI update
            document.getElementById('r-word').innerText = word;
            document.getElementById('results').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            lastWord = word;

            try {
                const trRes = await fetch(`https://translation.googleapis.com/language/translate/v2?key=${GOOGLE_KEY}`, {
                    method: 'POST', body: JSON.stringify({ q: word, target: 'ar', format: 'text' })
                });
                const trData = await trRes.json();
                const [dRes, tRes, rRes] = await Promise.all([
                    fetch(`https://www.dictionaryapi.com/api/v3/references/collegiate/json/${word}?key=${DICT_KEY}`),
                    fetch(`https://www.dictionaryapi.com/api/v3/references/thesaurus/json/${word}?key=${THES_KEY}`),
                    fetch(`https://api.datamuse.com/words?rel_rhy=${word}&max=8`)
                ]);
                
                const data = { 
                    word, trans: trData.data.translations[0].translatedText, 
                    dict: await dRes.json(), thes: await tRes.json(), rhymes: await rRes.json() 
                };
                
                // Unified Archive Update
                archive[word] = data;
                localStorage.setItem('lh_archive', JSON.stringify(archive));
                
                if(!history.includes(word)) history.unshift(word);
                localStorage.setItem('lh_history', JSON.stringify(history.slice(0, 50)));

                render(data);
                updateSidebar(); updateStarUI();
            } catch (e) { alert("Connectivity Error. Check Internet/Keys."); }
            finally { document.getElementById('loader').style.display = 'none'; }
        }

        function render(data) {
            const d = data.dict[0];
            document.getElementById('results').style.display = 'block';
            document.getElementById('r-word').innerText = data.word;
            document.getElementById('r-trans').innerText = data.trans;
            document.getElementById('r-pos').innerText = d.fl || "";
            document.getElementById('r-def').innerText = d.shortdef ? d.shortdef[0] : "N/A";
            document.getElementById('r-syll').innerText = d.hwi?.hw?.replace(/\*/g, '·') || data.word;
            document.getElementById('r-etym').innerText = d.et ? d.et[0][1].replace(/\{.*?\}/g, '') : "";

            const grid = document.getElementById('r-family-grid'); grid.innerHTML = "";
            let groups = { noun: [], adjective: [], adverb: [], verb: [], related: [] };
            
            data.dict.forEach(entry => {
                const head = entry.hwi?.hw?.replace(/\*/g, '').toLowerCase();
                const type = (entry.fl || "related").toLowerCase();
                if(head && head !== data.word && groups[type]) groups[type].push(head);
                if(entry.uros) entry.uros.forEach(u => {
                    const c = u.ure.replace(/\*/g, '').toLowerCase();
                    const utype = (u.fl || "related").toLowerCase();
                    if (c !== data.word) {
                        if(groups[utype]) groups[utype].push(c); else groups.related.push(c);
                    }
                });
            });

            for (let [type, members] of Object.entries(groups)) {
                if (members.length > 0) {
                    const sq = document.createElement('div'); sq.className = 'family-square';
                    sq.innerHTML = `<span class="square-label">${type}</span><div style="display:flex; flex-wrap:wrap; gap:5px;"></div>`;
                    const inner = sq.querySelector('div');
                    [...new Set(members)].slice(0, 8).forEach(m => {
                        const t = document.createElement('span'); t.className = 'tag'; t.innerText = m;
                        t.onclick = () => handleSearch(m); inner.appendChild(t);
                    });
                    grid.appendChild(sq);
                }
            }
            const synBox = document.getElementById('r-syn'); synBox.innerHTML = "";
            if(data.thes[0]?.meta?.syns) data.thes[0].meta.syns[0].slice(0, 10).forEach(s => {
                const t = document.createElement('span'); t.className = 'tag syn'; t.innerText = s;
                t.onclick = () => handleSearch(s); synBox.appendChild(t);
            });
            const rhymeBox = document.getElementById('r-rhyme'); rhymeBox.innerHTML = "";
            data.rhymes.forEach(r => {
                const ri = document.createElement('span'); ri.className = 'rhyme-item'; ri.innerText = r.word;
                ri.onclick = () => handleSearch(r.word); rhymeBox.appendChild(ri);
            });
        }

        function deleteWord(word, event) {
            event.stopPropagation();
            if(!confirm(`Remove "${word}"?`)) return;

            if (currentTab === 'history') {
                history = history.filter(w => w !== word);
                localStorage.setItem('lh_history', JSON.stringify(history));
            } else {
                bookmarks = bookmarks.filter(w => w !== word);
                localStorage.setItem('lh_bookmarks', JSON.stringify(bookmarks));
            }
            updateSidebar(); updateStarUI();
        }

        function toggleBookmark(wordParam = null) {
            const word = wordParam || lastWord;
            if(!word) return;
            const idx = bookmarks.indexOf(word);
            if(idx > -1) bookmarks.splice(idx, 1); else bookmarks.push(word);
            localStorage.setItem('lh_bookmarks', JSON.stringify(bookmarks));
            updateSidebar(); updateStarUI();
        }

        function exportArchive(source) {
            const list = source === 'history' ? history : bookmarks;
            if (list.length === 0) { alert("List is empty!"); return; }

            let html = `<html><head><style>
                body { font-family: 'Inter', sans-serif; background: #f1f5f9; padding: 50px; }
                .card { background: white; border-radius: 40px; padding: 50px; margin-bottom: 40px; border: 1px solid #e2e8f0; }
                .word { font-size: 3rem; font-weight: 800; text-transform: capitalize; margin: 0; }
                .line { height: 8px; background: #f59e0b; width: 150px; border-radius: 10px; margin: 10px 0; }
                .trans { font-family: 'Amiri', serif; font-size: 2.5rem; color: #2563eb; text-align: right; }
                .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 30px; }
                .sq { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 20px; padding: 20px; }
                .lbl { font-size: 0.65rem; font-weight: 900; color: #2563eb; text-transform: uppercase; border-bottom: 1px solid #eee; padding-bottom: 5px; margin-bottom: 10px; display:block; }
                .tag { display:inline-block; margin:4px; padding:6px 12px; background:white; border:1px solid #ddd; border-radius:10px; font-size:0.8rem; font-weight:bold; }
            </style></head><body><h1 style="text-align:center; opacity:0.3; margin-bottom:50px;">Lexicon Export: ${source.toUpperCase()}</h1>`;

            list.forEach(w => {
                const d = archive[w];
                if(d) {
                    html += `<div class="card"><div class="word">${w}</div><div class="line"></div><div class="trans">${d.trans}</div>`;
                    html += `<div class="grid">`;
                    let grps = { noun: [], adjective: [], adverb: [], verb: [] };
                    d.dict.forEach(e => {
                        const h = e.hwi?.hw?.replace(/\*/g, '').toLowerCase();
                        const t = (e.fl || "n/a").toLowerCase();
                        if(h && h !== w && grps[t]) grps[t].push(h);
                        if(e.uros) e.uros.forEach(u => {
                            const type = (u.fl || "n/a").toLowerCase();
                            if(grps[type]) grps[type].push(u.ure.replace(/\*/g,''));
                        })
                    });
                    for (let [t, m] of Object.entries(grps)) {
                        if (m.length > 0) {
                            html += `<div class="sq"><span class="lbl">${t}</span>`;
                            [...new Set(m)].slice(0, 5).forEach(word => html += `<span class="tag">${word}</span>`);
                            html += `</div>`;
                        }
                    }
                    html += `</div></div>`;
                }
            });

            html += "</body></html>";
            const blob = new Blob([html], { type: 'text/html' });
            const link = document.createElement('a'); link.href = URL.createObjectURL(blob);
            link.download = `LinguistHub_Export_${source}.html`; link.click(); closeModal();
        }

        function openModal() { document.getElementById('exportModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('exportModal').style.display = 'none'; }
        function updateStarUI() { document.getElementById('mainStar').classList.toggle('active', bookmarks.includes(lastWord)); }
        function setTab(t) { currentTab = t; document.getElementById('tab-history').classList.toggle('active', t==='history'); document.getElementById('tab-bookmarks').classList.toggle('active', t==='bookmarks'); updateSidebar(); }
        function toggleTheme() { document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }
        
        function updateSidebar() {
            const container = document.getElementById('list-items'); container.innerHTML = "";
            const data = currentTab === 'history' ? history : bookmarks;
            data.forEach(w => {
                const isB = bookmarks.includes(w);
                const div = document.createElement('div'); div.className = 'list-item';
                div.innerHTML = `
                    <span class="item-text" onclick="handleSearch('${w}')">${w}</span>
                    <svg class="action-icon star-svg ${isB ? 'active' : ''}" onclick="event.stopPropagation(); toggleBookmark('${w}')" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                    <svg class="action-icon del-svg" onclick="deleteWord('${w}', event)" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                `;
                container.appendChild(div);
            });
        }
        function clearAll() { if(confirm("Clear ALL local cache and history?")) { localStorage.clear(); location.reload(); } }
        
        // Load on start
        updateSidebar();
    </script>
</body>
</html>
